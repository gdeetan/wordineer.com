<!DOCTYPE html>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
  window.dataLayer = window.dataLayer || [];
  window.adsbygoogle = window.adsbygoogle || [];
  function gtag(){dataLayer.push(arguments);}

  (function(w, d) {
    var loaded = false;
    var cfg = {
      analyticsId: 'G-7DWH3EGM3Z',
      adsClient: 'ca-pub-7200956978416233',
      delay: 10000
    };

    function loadScript(src, attrs) {
      var s = d.createElement('script');
      s.async = true;
      s.src = src;
      if (attrs) {
        Object.keys(attrs).forEach(function(key) {
          s.setAttribute(key, attrs[key]);
        });
      }
      d.head.appendChild(s);
    }

    function loadMarketing() {
      if (loaded) return;
      loaded = true;
      gtag('js', new Date());
      gtag('config', cfg.analyticsId);
      loadScript('https://www.googletagmanager.com/gtag/js?id=' + cfg.analyticsId);
      loadScript(
        'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=' + cfg.adsClient,
        { crossorigin: 'anonymous' }
      );
    }

    function idleLoad() {
      if ('requestIdleCallback' in w) {
        w.requestIdleCallback(loadMarketing, { timeout: 5000 });
      } else {
        w.setTimeout(loadMarketing, cfg.delay);
      }
    }

    ['pointerdown', 'keydown', 'scroll', 'touchstart'].forEach(function(eventName) {
      w.addEventListener(eventName, loadMarketing, { once: true, passive: true });
    });
    w.addEventListener('load', function() {
      w.setTimeout(idleLoad, cfg.delay);
    }, { once: true });
  })(window, document);
</script>
